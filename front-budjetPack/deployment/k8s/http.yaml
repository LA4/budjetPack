# HTTPRoute
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: budjetpack-front-end-httproute
  namespace: budjetpack
spec:
  parentRefs:
  - name: traefik-gateway
    namespace: traefik
  hostnames:
  - web.127.0.0.1.nip.io
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: budjetpack-front-end-service
      namespace: budjetpack
      port: 3000