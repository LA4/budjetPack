services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  back-api:
    build:
      context: ./back-budjetPack
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql://app:app@postgres:5432/tasks"
      JWT_SECRET: "dev-secret-do-not-use-in-prod-please-32-chars"
      S3_ENDPOINT: "http://minio:9000"
      S3_BUCKET: uploads
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
    ports:
      - "3000:3000"

  front-app:
    build:
      context: ./front-budjetPack
      dockerfile: dockerfile
    ports:
      - "4200:80"
    depends_on:
      - back-api

volumes:
  pg_data:
  minio_data:
